name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/warhub/muster

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      # battlescribe-spec (nested submodule) is a private repo: mint a
      # WarHub bot GitHub App token for checkout, same pattern as
      # WarHub/wham's CI. Requires the org-level WARHUB_BOT_APP_ID var and
      # WARHUB_BOT_PRIVATE_KEY secret to be visible to this repo.
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.WARHUB_BOT_APP_ID }}
          private-key: ${{ secrets.WARHUB_BOT_PRIVATE_KEY }}
          owner: WarHub
          repositories: battlescribe-spec
      - uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          submodules: recursive

      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - run: dotnet test

  docker:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.WARHUB_BOT_APP_ID }}
          private-key: ${{ secrets.WARHUB_BOT_PRIVATE_KEY }}
          owner: WarHub
          repositories: battlescribe-spec
      - uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          submodules: recursive

      - name: Build image
        run: docker build -t "$IMAGE_NAME:ci" .

      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag and push
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          SHA_TAG="sha-${GITHUB_SHA:0:7}"
          docker tag "$IMAGE_NAME:ci" "$IMAGE_NAME:latest"
          docker tag "$IMAGE_NAME:ci" "$IMAGE_NAME:$SHA_TAG"
          docker push "$IMAGE_NAME:latest"
          docker push "$IMAGE_NAME:$SHA_TAG"
